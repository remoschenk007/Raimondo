<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#080808">
<title>RAIMONDO — Haus der leisen Kunst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
a,a:visited,a:active,a:link{color:#f0ede8!important;text-decoration:none!important;}
a:hover{color:#c8b49a!important;}
html{scroll-behavior:smooth;background:#080808!important;}
body{background:#080808!important;color:#f0ede8!important;font-family:'DM Mono',monospace;cursor:crosshair;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:#080808;pointer-events:none;z-index:-1;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:2rem 4rem;}
nav .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.3em;color:#f0ede8!important;}
nav ul{list-style:none;display:flex;gap:3rem;}
nav ul a{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#888880!important;}
nav ul a:hover{color:#f0ede8!important;}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 4rem 5rem;position:relative;overflow:hidden;background:#080808;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(5rem,14vw,14rem);font-weight:900;line-height:0.85;letter-spacing:-0.02em;color:#f0ede8;}
.hero h1 em{font-style:italic;color:#c8b49a;}
.hero-counter{font-size:0.6rem;letter-spacing:0.3em;color:#888880;margin-bottom:2rem;}
.hero-sub{display:flex;align-items:flex-end;justify-content:space-between;margin-top:3rem;}
.hero-sub p{font-size:0.7rem;letter-spacing:0.15em;color:#888880;line-height:1.8;max-width:280px;}
.hero-scroll{font-size:0.6rem;letter-spacing:0.3em;color:#888880;writing-mode:vertical-rl;text-transform:uppercase;display:flex;align-items:center;gap:1rem;}
.hero-scroll::before{content:'';width:1px;height:60px;background:#888880;}
.marquee-wrap{overflow:hidden;padding:1.5rem 0;background:#0a0a0a;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;}
.marquee-track{display:flex;white-space:nowrap;animation:marquee 30s linear infinite;}
.marquee-track span{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:0.3em;color:#222;padding:0 2rem;}
.marquee-track span.dot{color:#c8b49a;padding:0;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
section{padding:8rem 4rem;}
.section-label{font-size:0.6rem;letter-spacing:0.4em;color:#888880;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:1.5rem;}
.section-label::before{content:'';width:40px;height:1px;background:#888880;}
.about{display:grid;grid-template-columns:1fr 1fr;gap:8rem;align-items:start;border-top:1px solid #1a1a1a;background:#080808;}
.about-left h2{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4.5rem);font-weight:400;line-height:1.1;margin-bottom:2rem;color:#f0ede8;}
.about-left h2 em{font-style:italic;color:#c8b49a;}
.about-left blockquote{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:#c8b49a;border-left:1px solid #c8b49a;padding-left:1.5rem;margin:2rem 0;line-height:1.7;}
.about-right p{font-size:0.8rem;line-height:2;color:#aaa;margin-bottom:1.5rem;}
.about-specs{margin-top:3rem;display:flex;flex-direction:column;gap:0.8rem;}
.spec-row{display:flex;justify-content:space-between;padding:0.7rem 0;border-bottom:1px solid #1a1a1a;font-size:0.65rem;letter-spacing:0.1em;}
.spec-row .label{color:#888880;text-transform:uppercase;}
.spec-row .val{color:#f0ede8;}
.work{border-top:1px solid #1a1a1a;background:#080808;}
.work-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4rem;}
.work-header h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:400;color:#f0ede8;}
.photo-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:400px 300px;gap:3px;}
.photo-cell{overflow:hidden;position:relative;background:#1a1a1a;}
.photo-cell:first-child{grid-row:1/3;}
.photo-cell-inner{width:100%;height:100%;background:#111;transition:transform 0.8s ease;}
.photo-cell:hover .photo-cell-inner{transform:scale(1.05);}
.photo-cell-label{position:absolute;bottom:1rem;left:1rem;font-size:0.55rem;letter-spacing:0.3em;color:rgba(255,255,255,0.5);text-transform:uppercase;}
.house{background:#060606;border-top:1px solid #1a1a1a;position:relative;overflow:hidden;}
.house-inner{display:grid;grid-template-columns:1fr 1fr;gap:8rem;align-items:start;}
.house-text h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:700;line-height:1.1;margin-bottom:2rem;color:#f0ede8;}
.house-text h2 span{color:#c8b49a;}
.house-text p{font-size:0.78rem;line-height:2;color:#999;margin-bottom:1.2rem;}
.house-text blockquote{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:#c8b49a;padding:1.5rem;border:1px solid #1a1a1a;margin:2rem 0;line-height:1.7;}
.house-detail-item{padding:2rem;border:1px solid #1a1a1a;margin-bottom:1px;}
.house-detail-item .num{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#1a1a1a;line-height:1;margin-bottom:0.5rem;}
.house-detail-item h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:#f0ede8;margin-bottom:0.5rem;}
.house-detail-item p{font-size:0.65rem;color:#888880;line-height:1.8;}
.equipment{background:#080808;border-top:1px solid #1a1a1a;padding:5rem 4rem;}
.equipment-inner{display:flex;align-items:center;gap:6rem;}
.equipment-text h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);letter-spacing:0.05em;line-height:1;margin-bottom:1rem;color:#f0ede8;}
.equipment-text p{font-size:0.72rem;color:#888880;line-height:1.8;max-width:400px;}
.cam-row{display:flex;align-items:center;gap:2rem;padding:1.5rem 2rem;border:1px solid #1a1a1a;margin-bottom:1px;}
.cam-icon{width:40px;height:40px;border:1px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#888880;}
.cam-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.1em;color:#f0ede8;}
.cam-desc{font-size:0.6rem;color:#888880;margin-top:0.2rem;}
.manifesto{padding:6rem 4rem;background:#050505;border-top:1px solid #1a1a1a;text-align:center;}
.manifesto h2{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,3rem);font-style:italic;font-weight:400;line-height:1.5;color:#f0ede8;max-width:800px;margin:0 auto 1.5rem;}
.manifesto cite{font-size:0.65rem;letter-spacing:0.3em;color:#888880;text-transform:uppercase;font-style:normal;}
.career{border-top:1px solid #1a1a1a;background:#080808;}
.career h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:400;margin-bottom:4rem;color:#f0ede8;}
.timeline-item{display:grid;grid-template-columns:180px 1fr;gap:3rem;padding:2.5rem 0;border-bottom:1px solid #131313;}
.timeline-year{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.1em;color:#888880;padding-top:0.2rem;}
.timeline-content h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;margin-bottom:0.3rem;color:#f0ede8;}
.timeline-content .role{font-size:0.65rem;letter-spacing:0.15em;color:#c8b49a;text-transform:uppercase;margin-bottom:0.8rem;}
.timeline-content p{font-size:0.72rem;color:#666;line-height:1.8;max-width:600px;}
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:5rem;border:1px solid #1a1a1a;}
.skill-cell{padding:2rem 1.5rem;border-right:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;}
.skill-cell h4{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.2em;color:#c8b49a;margin-bottom:0.5rem;}
.skill-cell p{font-size:0.65rem;color:#888880;line-height:1.7;}
.contact{border-top:1px solid #1a1a1a;display:grid;grid-template-columns:1fr 1fr;gap:8rem;align-items:start;background:#080808;}
.contact h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:400;line-height:1.2;margin-bottom:2rem;color:#f0ede8;}
.contact h2 em{font-style:italic;color:#c8b49a;}
.contact-link{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0;border-bottom:1px solid #1a1a1a;color:#f0ede8!important;}
.contact-link span:first-child{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;}
.contact-link span:last-child{font-size:0.65rem;color:#888880;}
footer{padding:3rem 4rem;border-top:1px solid #111;display:flex;justify-content:space-between;align-items:center;background:#080808;}
footer .logo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.3em;color:#888;}
footer p{font-size:0.6rem;color:#666;letter-spacing:0.15em;}
.btn{display:inline-flex;align-items:center;gap:1rem;margin-top:2rem;padding:1rem 2rem;border:1px solid #333;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:#f0ede8!important;background:transparent;font-family:'DM Mono',monospace;cursor:pointer;}
.btn::after{content:'→';}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
</style>
